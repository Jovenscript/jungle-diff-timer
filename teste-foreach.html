<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Laboratório do forEach</title>

  <style>
    /* ===== Só o visual, não precisa entender agora ===== */
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1c1e24;
      color: #e9e4d8;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }
    h1 { color: #c9973f; border-bottom: 2px solid #c9973f; padding-bottom: 8px; }
    h2 { color: #7ce7e0; margin-top: 30px; font-size: 16px; }
    button {
      background: #c9973f; color: #1d1a12; border: none;
      padding: 10px 16px; border-radius: 8px; cursor: pointer;
      font-weight: bold; margin: 6px 0;
    }
    button:hover { background: #dbaa54; }
    .painel {
      background: #25282f; border: 1px solid #3a3e48;
      border-radius: 8px; padding: 14px; margin-top: 8px; min-height: 20px;
    }
    .painel p { margin: 4px 0; border-left: 3px solid #c9973f; padding-left: 8px; }
    .dica { color: #8a8d96; font-size: 13px; }
  </style>
</head>

<body>
  <h1>Laboratório do forEach</h1>
  <p class="dica">Abra o Console (tecla F12) pra ver as mensagens tambem. Clique nos botoes e observe.</p>

  <!-- ============ EXPERIMENTO 1 ============ -->
  <h2>1. forEach mostrando cada item</h2>
  <button onclick="experimento1()">Rodar experimento 1</button>
  <div class="painel" id="painel1"></div>

  <!-- ============ EXPERIMENTO 2 ============ -->
  <h2>2. forEach fazendo uma conta com cada item</h2>
  <button onclick="experimento2()">Rodar experimento 2</button>
  <div class="painel" id="painel2"></div>

  <!-- ============ EXPERIMENTO 3 ============ -->
  <h2>3. forEach com o indice (a posicao de cada item)</h2>
  <button onclick="experimento3()">Rodar experimento 3</button>
  <div class="painel" id="painel3"></div>


  <script>
    /* ==================================================================
       EXPERIMENTO 1 — o forEach mais simples
       ================================================================== */
    function experimento1() {

      // Crio uma lista (array) com 3 ferramentas.
      let ferramentas = ["chave de fenda", "alicate", "martelo"]

      // Pego o painel da tela onde vou escrever o resultado.
      let painel = document.getElementById("painel1")

      // Primeiro limpo o painel (caso ja tenha algo de um clique anterior).
      painel.innerHTML = ""

      // >>> AQUI ESTA O forEach <<<
      // Leia assim: "para CADA item da lista ferramentas, faca isto:"
      // A caixinha "item" chega preenchida com um valor diferente a cada volta.
      ferramentas.forEach(function(item) {

        // Esta linha roda UMA VEZ PRA CADA ferramenta.
        // 1a volta: item = "chave de fenda"
        // 2a volta: item = "alicate"
        // 3a volta: item = "martelo"
        console.log("Item da vez:", item)

        // E aqui eu desenho um paragrafo na tela pra cada item.
        painel.innerHTML += "<p>" + item + "</p>"

      })
      // Quando a lista acaba, o forEach para sozinho.
    }


    /* ==================================================================
       EXPERIMENTO 2 — fazendo uma CONTA com cada item
       (o forEach nao serve so pra mostrar; voce faz o que quiser dentro)
       ================================================================== */
    function experimento2() {

      // Uma lista de precos.
      let precos = [10, 25, 40]

      let painel = document.getElementById("painel2")
      painel.innerHTML = ""

      // Para cada preco, vou aplicar 10 reais de desconto.
      precos.forEach(function(valor) {

        // "valor" muda a cada volta: 10, depois 25, depois 40.
        let comDesconto = valor - 10   // faco a conta

        console.log(valor, "com desconto vira", comDesconto)

        painel.innerHTML += "<p>De R$ " + valor + " por R$ " + comDesconto + "</p>"

      })
    }


    /* ==================================================================
       EXPERIMENTO 3 — pedindo tambem o INDICE (a posicao)
       O forEach sempre sabe a posicao de cada item (0, 1, 2...).
       Basta abrir uma SEGUNDA caixinha pra receber ela.
       ================================================================== */
    function experimento3() {

      let colegas = ["Carlos", "Rafa", "Bruno"]

      let painel = document.getElementById("painel3")
      painel.innerHTML = ""

      // Repare: agora tem DUAS caixinhas -> (nome, posicao)
      // A 1a sempre recebe o VALOR. A 2a sempre recebe a POSICAO.
      // Os nomes sao livres; o que vale e a ordem.
      colegas.forEach(function(nome, posicao) {

        // 1a volta: nome="Carlos", posicao=0
        // 2a volta: nome="Rafa",   posicao=1
        // 3a volta: nome="Bruno",  posicao=2
        console.log("posicao", posicao, "=>", nome)

        painel.innerHTML += "<p>Gaveta " + posicao + ": " + nome + "</p>"

      })
    }
  </script>
</body>
</html>
