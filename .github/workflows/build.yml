name: Compilar overlay (Windows)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências
        run: npm install

      - name: Gerar executável
        run: npm run dist

      - name: Publicar o .exe
        uses: actions/upload-artifact@v4
        with:
          name: JungleDiffTimer
          path: dist/*.exe
          retention-days: 30
