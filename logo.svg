    </linearGradient>
    <linearGradient id="folha" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#2f9d76"/>
      <stop offset="1" stop-color="#68e9b0"/>
    </linearGradient>
    <radialGradient id="fundo" cx=".5" cy=".38">
      <stop offset="0" stop-color="#123040"/>
