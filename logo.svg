  <!-- folha-ponteiro: a lâmina aponta pro respawn -->
  <path d="M256 300 C176 268 156 176 196 108 C284 128 316 208 296 288 Z" fill="url(#folha)"/>
  <path d="M196 108 C232 176 246 236 256 300" fill="none" stroke="#07131a" stroke-opacity=".55" stroke-width="9" stroke-linecap="round"/>
  <path d="M256 300 C336 268 356 176 316 108 C228 128 196 208 216 288 Z" fill="url(#folha)" opacity=".35"/>

  <!-- eixo -->
  <circle cx="256" cy="316" r="30" fill="url(#ouro)"/>
  <circle cx="256" cy="316" r="14" fill="#07131a"/>

  <!-- diff -->
  <text x="256" y="418" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
