  </defs>

  <!-- disco -->
  <circle cx="256" cy="256" r="240" fill="url(#fundo)"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#ouro)" stroke-width="10"/>
  <circle cx="256" cy="256" r="212" fill="none" stroke="#d8b45c" stroke-opacity=".28" stroke-width="2"/>

  <!-- marcações do cronômetro -->
  <g stroke="url(#ouro)" stroke-width="7" stroke-linecap="round">
    <line x1="256" y1="40"  x2="256" y2="74"/>
    <line x1="472" y1="256" x2="438" y2="256"/>
    <line x1="256" y1="472" x2="256" y2="438"/>
    <line x1="40"  y1="256" x2="74"  y2="256"/>
  </g>
  <g stroke="#d8b45c" stroke-opacity=".45" stroke-width="4" stroke-linecap="round">
