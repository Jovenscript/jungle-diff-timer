    <line x1="459" y1="148" x2="432" y2="162"/>
    <line x1="459" y1="364" x2="432" y2="350"/>
    <line x1="364" y1="459" x2="350" y2="432"/>
    <line x1="148" y1="459" x2="162" y2="432"/>
    <line x1="53"  y1="364" x2="80"  y2="350"/>
    <line x1="53"  y1="148" x2="80"  y2="162"/>
    <line x1="148" y1="53"  x2="162" y2="80"/>
